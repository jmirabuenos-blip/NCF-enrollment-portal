{% extends 'pos_app/base.html' %}

{% block title %}Change Role - NCF CRM{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <h2 style="color: #2F6B3F; margin-bottom: 20px;">Change Role</h2>
        
        <div class="card">
            <div class="card-body">
                <p class="mb-3">User: <strong>{{ profile.user.username }}</strong></p>
                <p class="mb-4">Current Role: <strong>{{ profile.get_role_display }}</strong></p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_role" class="form-label">New Role</label>
                        <select name="role" id="id_role" class="form-control">
                            <option value="user" {% if profile.role == 'user' %}selected{% endif %}>User</option>
                            <option value="staff" {% if profile.role == 'staff' %}selected{% endif %}>Staff</option>
                            <option value="admin" {% if profile.role == 'admin' %}selected{% endif %}>Admin</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update</button>
                        <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
